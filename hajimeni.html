<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>初めに</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.7;
      margin: 0;
      color: #1f2937;
      background: #ffffff;
    }
    main {
      max-width: 900px;
      margin: 0 auto;
      padding: 24px;
    }
    h1, h2 {
      margin-top: 0;
      color: #111827;
    }
    .notice {
      border-left: 4px solid #f59e0b;
      background: #fffbeb;
      padding: 12px 16px;
      margin: 16px 0 24px;
    }
    ul {
      padding-left: 20px;
    }
  </style>
</head>
<body>
  <main>
    <h1>初めに</h1>
    <p>
      このポータルは、チーム内で共有したい HTML ドキュメントをまとめて閲覧するためのページです。
      左側の一覧から資料を選ぶと、右側で内容を確認できます。
    </p>

    <h2>使い方</h2>
    <ul>
      <li>左側の「ドキュメント一覧」から閲覧したいページをクリックします。</li>
      <li>選択したページは右側のビューアで表示されます。</li>
      <li>リンクを追加する場合は、ポータル側の一覧に項目を追記してください。</li>
    </ul>

    <div class="notice">
      <strong>注意</strong><br />
      この一覧には、利用手順だけでなく、さまざまなプロジェクトの共有事項が混在しています。<br />
      閲覧時は、対象プロジェクト名や公開日を確認し、情報の取り違えに注意してください。
    </div>
  </main>
</body>
</html>
